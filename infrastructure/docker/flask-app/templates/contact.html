{% extends "base.html" %}

{% block title %}Contact - REIT Sheet{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/contact.css') }}?v=1">
{% endblock %}

{% block content %}
<div class="contact-page">
    <div class="contact-card">
        <h1>{{ config.headline }}</h1>
        <p class="tagline">{{ config.tagline }}</p>

        <form method="POST" action="{{ url_for('contact.contact') }}" class="contact-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name"
                       value="{{ name|default('') }}"
                       placeholder="{{ config.name_placeholder }}" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                       value="{{ email|default('') }}"
                       placeholder="{{ config.email_placeholder }}" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5"
                          placeholder="{{ config.message_placeholder }}" required>{{ message|default('') }}</textarea>
            </div>

            {% if recaptcha_site_key %}
            <div class="form-group recaptcha-container">
                <div class="g-recaptcha" data-sitekey="{{ recaptcha_site_key }}"></div>
            </div>
            {% endif %}

            <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
    </div>
</div>

{% if recaptcha_site_key %}
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
{% endif %}
{% endblock %}
