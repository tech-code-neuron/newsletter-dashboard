<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out - REIT Sheet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logout-card {
            max-width: 400px;
            margin: 20px;
            padding: 48px 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            text-align: center;
        }
        .checkmark {
            width: 64px;
            height: 64px;
            background: #e8f5e9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 32px;
            color: #4caf50;
        }
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 12px;
        }
        p {
            color: #666;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .signin-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: #4285f4;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            font-size: 16px;
            transition: background 0.2s;
        }
        .signin-btn:hover {
            background: #3367d6;
        }
        .signin-btn svg {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="logout-card">
        <div class="checkmark">&#10003;</div>
        <h1>You've been logged out</h1>
        <p>Your session has ended successfully.<br>Click below to sign in again.</p>
        <a href="{{ url_for('auth.start_oauth') }}" class="signin-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/>
            </svg>
            Sign In with Google
        </a>
    </div>
</body>
</html>
